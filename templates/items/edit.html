{% extends "base.html" %}
{% block title %}Edit Item – ProcureHub{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Item</h1>
  <p>Update item details below.</p>
</div>

<div class="row">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-600" style="font-weight:600;">Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ item.name }}" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-600" style="font-weight:600;">Category</label>
            <input type="text" name="category" class="form-control" value="{{ item.category or '' }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-600" style="font-weight:600;">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ item.description or '' }}</textarea>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label fw-600" style="font-weight:600;">Quantity</label>
              <input type="number" step="any" name="qty" class="form-control" value="{{ item.qty or '' }}"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-600" style="font-weight:600;">Unit</label>
              <input type="text" name="unit" class="form-control" value="{{ item.unit or '' }}" placeholder="pcs, kg, m…"/>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            <a href="{{ url_for('items_list') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
